# Exported from Render on 2026-01-16T13:19:18Z
version: "1"
services:
- type: web
  name: Turni-di-Palco
  runtime: node
  repo: https://github.com/Heartran/Turni-di-Palco
  branch: render/preview
  plan: free
  envVars:
  - key: VITE_SUPABASE_ANON_KEY
    sync: false
  - key: VITE_SUPABASE_URL
    sync: false
  - key: VITE_DEV_CONTROL_PLANE_URL
    sync: false
  region: frankfurt
  buildCommand: npm ci && npm run build:mobile && npm run build:pwa
  startCommand: npm --workspace apps/pwa run preview:https -- --host 0.0.0.0 --port
    $PORT --strictPort --clearScreen false
  autoDeployTrigger: commit
- type: web
  name: Maxwell-AI-Support
  runtime: node
  repo: https://github.com/Heartran/Turni-di-Palco
  branch: render/preview
  plan: free
  envVars:
  - key: VITE_SUPABASE_ANON_KEY
    value: ${VITE_SUPABASE_ANON_KEY}
    sync: true
  - key: VITE_SUPABASE_URL
    value: ${VITE_SUPABASE_URL}
    sync: true
  - key: AI_SUPPORT_ALLOWED_ORIGINS
    value: https://turni-di-palco-fq85.onrender.com,https://turni-di-palco-fq85.onrender.com/mobile
    sync: false
  region: frankfurt
  buildCommand: npm ci && npm install -g @openai/codex && npm install -g gh
  startCommand: npm run ai:support
  autoDeployTrigger: commit
- type: web
  name: Turni-di-Palco-Control-Plane
  runtime: node
  repo: https://github.com/Heartran/Turni-di-Palco
  branch: render/preview
  plan: free
  envVars:
  - key: SUPABASE_URL
    value: ${VITE_SUPABASE_URL}
    sync: true
  - key: SUPABASE_ANON_KEY
    value: ${VITE_SUPABASE_ANON_KEY}
    sync: true
  - key: SUPABASE_SERVICE_ROLE_KEY
    sync: false
  - key: RENDER_API_KEY
    sync: false
  - key: RENDER_SERVICE_IDS_JSON
    sync: false
  - key: CONTROL_PLANE_ALLOWED_ORIGINS
    value: https://turni-di-palco-fq85.onrender.com,https://turni-di-palco-fq85.onrender.com/mobile
    sync: false
  - key: CONTROL_PLANE_ALLOWED_EMAILS
    sync: false
  - key: CONTROL_PLANE_RATE_LIMIT_PER_MIN
    value: "120"
    sync: true
  - key: CONTROL_PLANE_CONFIRM_TTL_MS
    value: "300000"
    sync: true
  region: frankfurt
  buildCommand: npm ci
  startCommand: npm run start:control-plane
  autoDeployTrigger: commit
