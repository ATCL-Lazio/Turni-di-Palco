[build]
  base = "/"
  command = "npm ci && npm run build:pwa"
  publish = "apps/pwa/dist"

[build.environment]
  NODE_VERSION = "22.14.0"
  SECRETS_SCAN_OMIT_KEYS = "VITE_SUPABASE_URL,VITE_SUPABASE_ANON_KEY,VITE_AI_SUPPORT_PORT,VITE_AI_SUPPORT_ENDPOINT,VITE_AI_SUPPORT_ISSUE_ENDPOINT"

[[redirects]]
  from = "/mobile/"
  to = "/mobile.html"
  status = 200

[[redirects]]
  from = "/mobile/*"
  to = "/public/mobile/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[context.production]
  command = "npm ci && npm run build:pwa"

[context.deploy-preview]
  command = "npm ci && npm run build:pwa"
