
<!DOCTYPE html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src 'self' https: wss:; frame-src 'self' https:; object-src 'none'; base-uri 'self'; form-action 'self' https:; frame-ancestors 'self'; upgrade-insecure-requests"

    <script>
      (function () {
        var localHosts = new Set(["localhost", "127.0.0.1", "::1", "[::1]"]);
        if (localHosts.has(window.location.hostname)) return;
        var manifestLink = document.createElement("link");
        manifestLink.rel = "manifest";
        manifestLink.href = "/mobile/manifest.webmanifest";
        document.head.appendChild(manifestLink);
      })();
    </script>
    <base href="/mobile/" />
    <link rel="icon" type="image/png" sizes="192x192" href="icons/pwa-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="icons/pwa-512.png" />

    <link rel="apple-touch-icon" sizes="180x180" href="icons/pwa-180.png" />
    <link rel="apple-touch-icon-precomposed" sizes="180x180" href="icons/pwa-180.png" />
  </head>

  <body class="mobile-fixed-bg">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
