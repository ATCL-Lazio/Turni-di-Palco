<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>Turni di Palco</title>
    <meta name="description" content="PWA shell for Turni di Palco" />
    <meta name="theme-color" content="#05070d" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/pwa-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icons/pwa-512.png" />
    <link rel="icon" type="image/x-icon" href="/icons/pwa-512.png" />
    <link rel="shortcut icon" href="/icons/pwa-512.png" />
    <link rel="icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="apple-touch-icon-precomposed" sizes="180x180" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Turni di Palco" />
    <script>
      window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
    </script>
    <script defer src="/_vercel/insights/script.js"></script>
  </head>
  <body data-theme="dark">
    <div id="app"></div>
    <script>
      (function () {
        const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
        if (isMobile && !location.pathname.startsWith("/mobile")) {
          const target = "/mobile/";
          // evitiamo loop se il file non esiste
          fetch(target, { method: "HEAD" })
            .then((response) => {
              if (response.ok) {
                window.location.replace(target);
              }
            })
            .catch(() => undefined);
        }
      })();
    </script>
    <script type="module" src="/src/dev-plus/main.tsx"></script>
  </body>
</html>
