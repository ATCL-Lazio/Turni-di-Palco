<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Turni di Palco</title>
    <meta name="description" content="PWA shell for Turni di Palco" />
    <meta name="theme-color" content="#0f172a" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/pwa-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icons/pwa-512.png" />
    <link rel="apple-touch-icon" href="/icons/pwa-192.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  </head>
  <body>
    <div id="app"></div>
    <script>
      (function () {
        const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
        if (isMobile && !location.pathname.startsWith("/mobile")) {
          const target = "/mobile/index.html";
          // evitiamo loop se il file non esiste
          fetch(target, { method: "HEAD" })
            .then((response) => {
              if (response.ok) {
                window.location.replace(target);
              }
            })
            .catch(() => undefined);
        }
      })();
    </script>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
