name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.14.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run lint (PWA)
        run: npm run lint:pwa

      - name: Run lint (Mobile)
        run: npm run lint:mobile

      # TODO: enable once pre-existing type errors are resolved
      # - name: Run type check (PWA)
      #   run: npm --workspace apps/pwa run typecheck
      # - name: Run type check (Mobile)
      #   run: npm --workspace apps/mobile run typecheck

      - name: Run tests
        run: npm run test:pwa

  italian-proofreading:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.14.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Extract UI copy
        run: node tools/extract-ui-copy.js

      - name: Run Italian spelling and grammar check
        uses: reviewdog/action-languagetool@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          reporter: github-check
          language: it
          patterns: "**/*.md **/*.txt **/*.html .temp/ci/ui-copy.txt"
          disabled_categories: "CASING,PUNCTUATION"
          fail_level: error
