# =============================================================================
# Claude Code — review automatico delle PR
# -----------------------------------------------------------------------------
# Gira AUTOMATICAMENTE su ogni PR aperta/aggiornata, senza bisogno di
# mention. Pubblica commenti di review focalizzati su Turni-di-Palco:
#   - sicurezza Supabase (RLS, service_role, secrets)
#   - accessibilità WCAG 2.1 AA / EN 301 549 / EAA
#   - correttezza, coerenza, performance
#
# Auth: OAuth token Claude.ai (Pro/Max).
#   Secret richiesto: CLAUDE_CODE_OAUTH_TOKEN
#
# NOTA: ogni run consuma quota dal tuo abbonamento Pro/Max. Se inizia a
# bruciare troppo, puoi:
#   - alzare il filtro paths sotto (review solo su file critici)
#   - abbassare --max-turns
#   - disabilitare temporaneamente il workflow da GitHub UI
# =============================================================================

name: Claude Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    # Decommenta per limitare il review ai soli path "critici":
    # paths:
    #   - "apps/**"
    #   - "api/**"
    #   - "shared/**"
    #   - "supabase/**"
    #   - "assets/**"
    #   - "_layouts/**"
    #   - "package.json"

# Se arriva un nuovo push sulla stessa PR, cancella il review in corso
concurrency:
  group: claude-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    # Skip PR draft e PR aperte da bot (dependabot ecc.)
    if: |
      github.event.pull_request.draft == false &&
      github.event.pull_request.user.type != 'Bot'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read         # solo lettura del codice
      pull-requests: write   # pubblicare review comment
      issues: write          # commenti sulla PR (sono "issue comment" lato API)
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # serve la history completa per il diff

      - name: Claude Review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: "--max-turns 8"
          prompt: |
            Sei la AI reviewer di **Turni-di-Palco**, l'applicazione di gestione
            turni di ATCL-Lazio. Stack: Jekyll + Node/serverless, backend
            Supabase, deploy su Vercel/Netlify/Render.

            Fai una review del diff di questa PR e pubblica i tuoi findings come
            commenti di review inline (sulle righe specifiche, quando possibile).
            Sii diretto, niente fluff, niente complimenti generici. Se non c'è
            nulla di critico, dillo in una frase e chiudi.

            Prima di iniziare, **leggi CLAUDE.md e AGENTS.md nella root del
            repository** per allinearti alle regole di progetto già definite.

            ## Focus della review

            ### 1. Correttezza e logic bugs
            - Edge case, off-by-one, gestione errori, race condition.
            - Query Supabase: filtri corretti, paginazione, gestione dei null,
              `.maybeSingle()` vs `.single()`, error handling.

            ### 2. Sicurezza (priorità alta)
            - **Nessuna `SUPABASE_SERVICE_ROLE_KEY` usata lato client.** Mai.
            - **Row Level Security**: tutte le tabelle nuove o modificate devono
              avere policy RLS coerenti. Segnala qualsiasi query/endpoint che
              bypassa RLS senza giustificazione esplicita.
            - Nessun secret hard-coded (chiavi, token, URL privati, JWT).
            - Validazione input lato server, mai fidarsi del client.
            - SQL injection / XSS / CSRF / open redirect dove applicabile.
            - Headers di sicurezza nei serverless handler (CORS, CSP) coerenti.

            ### 3. Accessibilità — WCAG 2.1 AA / EN 301 549 / EAA
            L'app **deve** rispettare l'European Accessibility Act. Verifica:
            - Markup semantico: `<header>`, `<nav>`, `<main>`, `<button>` vs
              `<div>`, `<a>` solo per navigazione.
            - Ogni `<input>` ha `<label>` associato (o `aria-label` quando il
              label visivo è impraticabile).
            - Ogni `<img>` ha `alt`; le immagini decorative hanno `alt=""`.
            - Bottoni e link distinguibili e operabili da tastiera.
            - Focus visibile, ordine di tab logico, nessun `tabindex` positivo.
            - Contrasto colore: 4.5:1 testo normale, 3:1 testo grande e
              componenti UI / stati focus.
            - `aria-*` usato correttamente, niente `aria-hidden` su elementi
              focusable, niente role abusati.
            - Errori di form annunciati ad assistive technology
              (`aria-invalid`, `aria-describedby`, `role="alert"`).
            - Nessuna informazione veicolata SOLO dal colore.
            - Heading order coerente (no salti h1 → h3).
            - Tabelle dati con `<th scope>` e caption quando serve.

            ### 4. Coerenza con il codebase
            - Rispetta i pattern e le convenzioni già presenti.
            - Stile coerente con eslint config e `.prettierrc`.
            - Non duplicare utility già esistenti in `shared/`.

            ### 5. Performance e manutenibilità
            - Query N+1, payload eccessivi, re-render inutili.
            - Codice duplicato, funzioni troppo lunghe, naming ambiguo.
            - Bundle size: import mirati, no librerie pesanti per cose triviali.

            ## Formato output

            Concludi con un summary comment finale strutturato così:

            **🔴 Bloccante** (da fixare prima del merge) — elenco puntato.
            **🟡 Da valutare** (suggerimenti utili, non bloccanti) — elenco.
            **🟢 Ok** (cose fatte bene, max 2-3 punti, breve).

            Se la PR è piccola e pulita, una review di 3 righe è perfetta — non
            inventare problemi per giustificare la tua esistenza.

            Rispondi in **italiano**.
