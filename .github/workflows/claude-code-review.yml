name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  claude-review:
    runs-on: [self-hosted, Windows, X64]
    defaults:
      run:
        shell: powershell
    steps:
      - name: Checkout PR
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Get changed files
        id: files
        run: |
          $files = gh pr view ${{ github.event.pull_request.number }} --json files --jq '.files[].path' | ForEach-Object { $_.Trim() } | Where-Object { $_ -match '\.(ts|tsx|js|jsx|py|go|rs|java|cs|php|rb|swift|kt|dart|css|scss|less|html|json|yaml|yml|md|sql)$' }
          $filesList = $files -join ' '
          "changed_files=$filesList" >> $env:GITHUB_OUTPUT
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Post in-progress comment
        id: progress
        run: |
          $tempFile = [System.IO.Path]::GetTempFileName()
          "## 🔄 Claude Code Review in progress...`n`nAnalyzing changed files on ${{ runner.name }}..." | Out-File -FilePath $tempFile -Encoding utf8
          $result = gh pr comment ${{ github.event.pull_request.number }} --body-file $tempFile --json id --jq '.id'
          "comment_id=$result" >> $env:GITHUB_OUTPUT
          Remove-Item $tempFile
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Claude Code Review
        id: review
        run: |
          $changedFiles = "${{ steps.files.outputs.changed_files }}"
          $reviewOutput = ""
          $maxLines = 500
          
          if ($changedFiles) {
            foreach ($file in $changedFiles.Split(' ')) {
              if (Test-Path $file) {
                $content = Get-Content $file -Raw -ErrorAction SilentlyContinue
                $lines = $content -split "`n"
                $truncated = $lines | Select-Object -First $maxLines
                $fileContent = $truncated -join "`n"
                
                $prompt = "Review this code file for: 1. Security vulnerabilities 2. Performance issues 3. Code quality and maintainability 4. Bugs or logic errors 5. Best practices violations. File: $file. Code: $fileContent. Provide concise actionable findings or 'LGTM - no issues found.'"
                
                $result = claude -p "$prompt" --model haiku --allowed-tools="Read,Edit,WebSearch,Bash" 2>&1 | Out-String
                
                # Check for usage/quota errors
                if ($result -match "usage.*exhausted|rate.*limit|quota|429|403" -or $LASTEXITCODE -ne 0) {
                  $result = "⚠️ **Claude API limit reached** - Could not complete review for this file.`n`nError: $result"
                }
                
                $reviewOutput += "### Review: $file`n`n$result`n`n---`n`n"
              }
            }
          } else {
            $reviewOutput = "No relevant files to review in this PR."
          }
          
          # Save review to file for posting
          $reviewOutput | Out-File -FilePath "review_output.md" -Encoding utf8
          "review_complete=true" >> $env:GITHUB_OUTPUT
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update or post review results
        run: |
          $reviewBody = Get-Content "review_output.md" -Raw
          $commentBody = "## 🤖 Claude Code Review`n`n$reviewBody`n`n---`n*Reviewed by Claude Code CLI on ${{ runner.name }} at $(Get-Date -Format 'yyyy-MM-dd HH:mm')*"
          $tempFile = [System.IO.Path]::GetTempFileName()
          $commentBody | Out-File -FilePath $tempFile -Encoding utf8
          
          # Get the PR action type
          $prAction = "${{ github.event.action }}"
          $commentId = "${{ steps.progress.outputs.comment_id }}"
          
          if ($prAction -eq "opened" -and $commentId) {
            # First review: update the in-progress comment using API
            $body = @{ body = $commentBody } | ConvertTo-Json
            $body | gh api repos/${{ github.repository }}/issues/comments/$commentId -X PATCH --input -
          } else {
            # Subsequent update: post new comment
            gh pr comment ${{ github.event.pull_request.number }} --body-file $tempFile
          }
          Remove-Item $tempFile
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Post review status (failure path)
        if: failure()
        run: |
          $prAction = "${{ github.event.action }}"
          $commentId = "${{ steps.progress.outputs.comment_id }}"
          $errorBody = "## 🤖 Claude Code Review - Error`n`nFailed to complete code review. Check runner logs on ${{ runner.name }}."
          $tempFile = [System.IO.Path]::GetTempFileName()
          $errorBody | Out-File -FilePath $tempFile -Encoding utf8
          
          if ($prAction -eq "opened" -and $commentId) {
            # Update the in-progress comment with error using API
            $body = @{ body = $errorBody } | ConvertTo-Json
            $body | gh api repos/${{ github.repository }}/issues/comments/$commentId -X PATCH --input -
          } else {
            # Post new error comment
            gh pr comment ${{ github.event.pull_request.number }} --body-file $tempFile
          }
          Remove-Item $tempFile
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
