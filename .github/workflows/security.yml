name: Security Checks

on:
  push:
    branches: [ main ]
  pull_request:
  schedule:
    - cron: "0 5 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dependency-audit:
    name: Dependency Audit (${{ matrix.path }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: root
            path: .
            lockfile: package-lock.json
          - name: mobile
            path: apps/mobile
            lockfile: apps/mobile/package-lock.json
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22.14.0
          cache: npm
          cache-dependency-path: ${{ matrix.lockfile }}

      - name: Install dependencies
        run: npm ci --ignore-scripts
        working-directory: ${{ matrix.path }}

      - name: Generate npm audit report
        run: npm audit --json > audit-report.json
        continue-on-error: true
        working-directory: ${{ matrix.path }}

      - name: Upload npm audit report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: npm-audit-report-${{ matrix.name }}
          path: ${{ matrix.path }}/audit-report.json
          if-no-files-found: error

      - name: Enforce strict audit policy
        run: |
          node -e "const fs=require('fs');const r=JSON.parse(fs.readFileSync('audit-report.json','utf8'));const v=(r.metadata&&r.metadata.vulnerabilities)||{};const low=Number(v.low||0);const moderate=Number(v.moderate||0);const high=Number(v.high||0);const critical=Number(v.critical||0);const total=low+moderate+high+critical;const message='npm audit vulnerabilities => low='+low+', moderate='+moderate+', high='+high+', critical='+critical;if(total>0){console.error(message);process.exit(1);}console.log(message);"
        working-directory: ${{ matrix.path }}

  secret-scan:
    name: Secret Scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      # Scansione del working tree corrente (`--no-git`): blocca qualsiasi
      # segreto presente in un file versionato. La config .gitleaks.toml estende
      # il ruleset di default e aggiunge regole per i token Render/UptimeRobot.
      # `--exit-code=1` fa fallire il job (e quindi la PR) se trova un segreto.
      - name: Run gitleaks
        run: |
          docker run --rm -v "$PWD:/repo" ghcr.io/gitleaks/gitleaks:v8.21.2 \
            detect \
            --source=/repo \
            --no-git \
            --config=/repo/.gitleaks.toml \
            --redact \
            --verbose \
            --exit-code=1 \
            --report-format=sarif \
            --report-path=/repo/gitleaks-report.sarif

      - name: Upload gitleaks report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: gitleaks-report
          path: gitleaks-report.sarif
          if-no-files-found: ignore
