name: Local Build (self-hosted)

on:
  workflow_run:
    workflows: [ "Update Server Repository" ]
    branches: [ main ]
    types: [ completed ]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: local-build-main
  cancel-in-progress: true

jobs:
  build:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: [self-hosted, windows]
    defaults:
      run:
        shell: powershell
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Terminate lingering esbuild processes
        run: Get-Process esbuild -ErrorAction SilentlyContinue | Stop-Process -Force -ErrorAction SilentlyContinue

      - name: Clean existing node_modules
        run: |
          Get-ChildItem -Path . -Filter node_modules -Directory -Recurse -ErrorAction SilentlyContinue |
            Remove-Item -Recurse -Force -ErrorAction SilentlyContinue

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.14.0
          cache: npm
          
      - name: Build mobile bundle
        run: npm run build:mobile

      - name: Build PWA
        run: npm run build:pwa
