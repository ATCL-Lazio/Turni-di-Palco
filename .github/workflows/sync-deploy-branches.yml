name: Sync Deploy Branches

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:

  configuration:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Configure Git
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"

  sync-render-preview:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
    - name: Configure Git
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Sync branch
      run: |
        git checkout render/preview || git checkout -b render/preview origin/main
        # Only sync if main is actually ahead
        if [ "$(git rev-list --count HEAD..origin/main)" -gt 0 ]; then
          git merge origin/main --no-ff -m "Auto-sync from main [skip ci]"
          git push origin render/preview
        else
          echo "No changes to sync - render/preview is up to date"
        fi

    - name: Trigger Render deployments
      run: |
        echo "✅ Branches synchronized successfully"
        echo "🔄 Render will auto-deploy render/preview"
        echo "🌐 Netlify will auto-deploy netlify/preview (if configured)"

  sync-netlify-preview:
    needs: sync-render-preview
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Configure Git
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Sync branch
      run: |
        git checkout netlify/preview || git checkout -b netlify/preview origin/main
        # Only sync if main is actually ahead
        if [ "$(git rev-list --count HEAD..origin/main)" -gt 0 ]; then
          git merge origin/main --no-ff -m "Auto-sync from main [skip ci]"
          git push origin netlify/preview
        else
          echo "No changes to sync - netlify/preview is up to date"
        fi

    - name: Trigger Netlify deployments
      run: |
        echo "✅ Branches synchronized successfully"
        echo "🔄 Render will auto-deploy render/preview"
        echo "🌐 Netlify will auto-deploy netlify/preview (if configured)"