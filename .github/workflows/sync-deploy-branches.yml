name: Sync Deploy Branches

on:
  push:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: sync-deploy-branches
  cancel-in-progress: true

jobs:
  sync-deploy-preview-branches:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      deploy_sha: ${{ steps.sync-preview-branches.outputs.deploy_sha }}
      sync_epoch: ${{ steps.sync-preview-branches.outputs.sync_epoch }}
    steps:
      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync preview branches
        id: sync-preview-branches
        env:
          GH_SYNC_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          git remote set-url origin "https://x-access-token:${GH_SYNC_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

          retry() {
            for attempt in 1 2 3; do
              if "$@"; then
                return 0
              fi
              echo "Command failed (attempt ${attempt}/3): $*" >&2
              sleep 2
            done
            return 1
          }

          retry git fetch origin main
          # Hard align deploy preview branches to main to avoid merge commits
          git checkout -B render/preview origin/main
          retry git push -f origin render/preview
          git checkout -B railway/preview origin/main
          retry git push -f origin railway/preview
          echo "deploy_sha=$(git rev-parse origin/main)" >> "$GITHUB_OUTPUT"
          echo "sync_epoch=$(date +%s)" >> "$GITHUB_OUTPUT"

  sync-netlify-preview:
    needs: sync-deploy-preview-branches
    runs-on: ubuntu-latest
    permissions:
      contents: write
      deployments: write

    steps:
      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync branch
        id: sync-netlify-branch
        env:
          GH_SYNC_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          git remote set-url origin "https://x-access-token:${GH_SYNC_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

          retry() {
            for attempt in 1 2 3; do
              if "$@"; then
                return 0
              fi
              echo "Command failed (attempt ${attempt}/3): $*" >&2
              sleep 2
            done
            return 1
          }

          retry git fetch origin main
          # Hard align netlify/preview to main to avoid merge commits
          git checkout -B netlify/preview origin/main
          retry git push -f origin netlify/preview
          echo "deploy_sha=$(git rev-parse origin/main)" >> "$GITHUB_OUTPUT"
          echo "sync_epoch=$(date +%s)" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Deployment - Netlify Preview
        uses: chrnorm/deployment-action@v2
        id: deployment-netlify
        with:
          token: '${{ github.token }}'
          ref: netlify/preview
          environment-url: https://turni-di-palco.netlify.app
          environment: netlify/preview - Turni-di-Palco
          description: 'Deploy to Netlify preview environment'

      - name: Mark deployment in progress - Netlify
        if: always() && steps.deployment-netlify.outputs.deployment_id != ''
        uses: chrnorm/deployment-status@v2
        with:
          token: '${{ github.token }}'
          deployment-id: ${{ steps.deployment-netlify.outputs.deployment_id }}
          state: 'in_progress'
          environment-url: https://turni-di-palco.netlify.app

      - name: Wait for Netlify auto-deploy
        id: wait-netlify
        env:
          DEPLOY_SHA: ${{ steps.sync-netlify-branch.outputs.deploy_sha }}
          SYNC_EPOCH: ${{ steps.sync-netlify-branch.outputs.sync_epoch }}
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID_TURNI: ${{ secrets.NETLIFY_SITE_ID_TURNI }}
        run: |
          set -euo pipefail

          for var in DEPLOY_SHA SYNC_EPOCH NETLIFY_AUTH_TOKEN NETLIFY_SITE_ID_TURNI; do
            if [ -z "${!var:-}" ]; then
              echo "Missing required value: $var"
              echo "netlify_status=failure" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          done

          is_netlify_paused_payload() {
            local payload="$1"
            local normalized
            normalized="$(printf '%s' "$payload" | tr '[:upper:]' '[:lower:]')"
            printf '%s' "$normalized" | grep -Eq 'site not available|site is paused|project is paused|account is paused|usage limit|credit allotment|bandwidth allotment|build minutes allotment'
          }

          check_netlify_site_paused() {
            local response_file http_code body
            response_file="$(mktemp)"
            http_code="$(curl -sS -L -o "$response_file" -w "%{http_code}" "https://turni-di-palco.netlify.app" || true)"
            body="$(cat "$response_file" 2>/dev/null || true)"
            rm -f "$response_file"

            if is_netlify_paused_payload "$body"; then
              echo "[Netlify] public site indicates the project is paused or unavailable due to plan/usage limits (HTTP ${http_code:-unknown})."
              return 0
            fi

            return 1
          }

          status="pending"
          min_epoch="$((SYNC_EPOCH - 300))"
          for attempt in $(seq 1 90); do
            response_file="$(mktemp)"
            headers_file="$(mktemp)"
            http_code="$(curl -sS \
              -D "$headers_file" \
              -o "$response_file" \
              -w "%{http_code}" \
              -H "Authorization: Bearer $NETLIFY_AUTH_TOKEN" \
              "https://api.netlify.com/api/v1/sites/${NETLIFY_SITE_ID_TURNI}/deploys?per_page=50" \
              || true)"
            response="$(cat "$response_file")"
            retry_after="$(awk 'BEGIN { IGNORECASE = 1 } /^Retry-After:/ { gsub("\r", "", $2); print $2; exit }' "$headers_file")"
            rm -f "$response_file" "$headers_file"

            if [ -z "$http_code" ] || [ "$http_code" = "000" ]; then
              if check_netlify_site_paused; then
                status="skipped"
                break
              fi
              echo "[Netlify] API request failed before receiving an HTTP status (attempt $attempt/90)" >&2
              status="failure"
              break
            fi

            if [ "$http_code" = "429" ]; then
              wait_seconds="${retry_after:-}"
              if ! [[ "$wait_seconds" =~ ^[0-9]+$ ]]; then
                wait_seconds=60
              fi
              if [ "$wait_seconds" -lt 5 ]; then
                wait_seconds=5
              fi
              if [ "$wait_seconds" -gt 180 ]; then
                wait_seconds=180
              fi
              echo "[Netlify] rate limited on attempt $attempt/90 (HTTP 429). Retrying in ${wait_seconds}s."
              sleep "$wait_seconds"
              continue
            fi

            if [ "$http_code" -lt 200 ] || [ "$http_code" -ge 300 ]; then
              if is_netlify_paused_payload "$response" || check_netlify_site_paused; then
                status="skipped"
                break
              fi
              echo "[Netlify] API request failed with HTTP $http_code (attempt $attempt/90)" >&2
              status="failure"
              break
            fi

            deploys_json="$(echo "$response" | jq -c '
              if type == "array" then .
              elif .deploys then .deploys
              elif .data then .data
              elif .items then .items
              else [] end
              | map({
                  id: (.id // .deploy_id // ""),
                  state: (.state // .status // "unknown"),
                  branch: (.branch // ""),
                  context: (.context // ""),
                  commit: (
                    (
                      (.commit_ref // .commit_sha // "") as $commit
                      | if $commit != "" then
                          $commit
                        else
                          (
                            if has("commit") then
                              (
                                .commit as $c
                                | if ($c | type) == "object" then ($c.id // $c.sha // "")
                                  elif ($c | type) == "string" then $c
                                  else ""
                                  end
                              )
                            else
                              ""
                            end
                          )
                        end
                    )
                  ),
                  createdAt: (.created_at // .createdAt // .created // ""),
                  createdEpoch: (
                    (.created_at // .createdAt // .created // 0) as $created
                    | if ($created | type) == "string" and $created != "" then
                        ($created | sub("\\.[0-9]+Z$"; "Z") | fromdateiso8601? // 0)
                      elif ($created | type) == "number" then
                        (if $created > 20000000000 then ($created / 1000 | floor) else ($created | floor) end)
                      else 0
                      end
                  )
                })
              | map(select(.id != ""))
              | unique_by(.id)
            ')"

            recent_deploys="$(echo "$deploys_json" | jq -c --argjson min_epoch "$min_epoch" '
              map(select(.createdEpoch >= $min_epoch))
              | sort_by(.createdEpoch)
              | reverse
            ')"

            deploy_match="$(echo "$recent_deploys" | jq -c --arg sha "$DEPLOY_SHA" '
              map(
                select(
                  (.commit // "") as $c
                  | ($c | tostring) as $cs
                  | ($cs != "" and ($cs == $sha or ($sha | startswith($cs)) or ($cs | startswith($sha[0:7]))))
                )
              )
              | first // empty
            ')"
            if [ -n "$deploy_match" ]; then
              deploy="$deploy_match"
            else
              deploy="$(echo "$recent_deploys" | jq -c 'first // empty')"
            fi

            if [ "$deploy" = "null" ] || [ -z "$deploy" ]; then
              latest_id="$(echo "$deploys_json" | jq -r 'sort_by(.createdEpoch) | reverse | first | (.id // "none")')"
              latest_commit="$(echo "$deploys_json" | jq -r 'sort_by(.createdEpoch) | reverse | first | (.commit // "none")')"
              latest_branch="$(echo "$deploys_json" | jq -r 'sort_by(.createdEpoch) | reverse | first | (.branch // "none")')"
              latest_context="$(echo "$deploys_json" | jq -r 'sort_by(.createdEpoch) | reverse | first | (.context // "none")')"
              echo "[Netlify] attempt $attempt/90: no recent deploy found for $DEPLOY_SHA (latest id: $latest_id, commit: $latest_commit, branch: $latest_branch, context: $latest_context)"
              if [ "$attempt" -ge 6 ] && [ $((attempt % 3)) -eq 0 ] && check_netlify_site_paused; then
                status="skipped"
                break
              fi
              sleep 20
              continue
            fi

            deploy_id="$(echo "$deploy" | jq -r '.id // "none"')"
            deploy_state="$(echo "$deploy" | jq -r '.state // "unknown"')"
            deploy_branch="$(echo "$deploy" | jq -r '.branch // "none"')"
            deploy_context="$(echo "$deploy" | jq -r '.context // "none"')"
            deploy_commit="$(echo "$deploy" | jq -r '.commit // "none"')"
            echo "[Netlify] attempt $attempt/90: deploy_id=$deploy_id state=$deploy_state commit=$deploy_commit branch=$deploy_branch context=$deploy_context"

            case "$deploy_state" in
              ready|current|published|live|success)
                status="success"
                break
                ;;
              *_failed|failed|error|canceled|cancelled)
                status="failure"
                break
                ;;
              *)
                sleep 20
                ;;
            esac
          done

          if [ "$status" = "pending" ]; then
            status="failure"
          fi

          echo "netlify_status=$status" >> "$GITHUB_OUTPUT"

      - name: Update deployment status (success) - Netlify
        if: always() && steps.wait-netlify.outputs.netlify_status == 'success' && steps.deployment-netlify.outputs.deployment_id != ''
        uses: chrnorm/deployment-status@v2
        with:
          token: '${{ github.token }}'
          deployment-id: ${{ steps.deployment-netlify.outputs.deployment_id }}
          state: 'success'
          environment-url: https://turni-di-palco.netlify.app

      - name: Update deployment status (inactive) - Netlify
        if: always() && steps.wait-netlify.outputs.netlify_status == 'skipped' && steps.deployment-netlify.outputs.deployment_id != ''
        uses: chrnorm/deployment-status@v2
        with:
          token: '${{ github.token }}'
          deployment-id: ${{ steps.deployment-netlify.outputs.deployment_id }}
          state: 'inactive'
          environment-url: https://turni-di-palco.netlify.app

      - name: Update deployment status (failure) - Netlify
        if: always() && steps.wait-netlify.outputs.netlify_status == 'failure' && steps.deployment-netlify.outputs.deployment_id != ''
        uses: chrnorm/deployment-status@v2
        with:
          token: '${{ github.token }}'
          deployment-id: ${{ steps.deployment-netlify.outputs.deployment_id }}
          state: 'failure'
          environment-url: https://turni-di-palco.netlify.app

      - name: Fail workflow if Netlify deploy failed
        if: always() && steps.wait-netlify.outputs.netlify_status == 'failure'
        run: exit 1

  deploy-railway:
    runs-on: ubuntu-latest
    needs: sync-deploy-preview-branches
    permissions:
      contents: read
    env:
      RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
      RAILWAY_PROJECT_ID: 1517725a-20c2-49d2-baea-3be40ad0d8d2
      RAILWAY_ENVIRONMENT: production
      DEPLOY_SHA: ${{ needs.sync-deploy-preview-branches.outputs.deploy_sha }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate Railway token
        run: |
          set -euo pipefail
          if [ -z "${RAILWAY_API_TOKEN:-}" ]; then
            echo "::error::Missing secret RAILWAY_API_TOKEN. Configure it in repository secrets to enable deterministic Railway deploys."
            exit 1
          fi

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Verify Railway authentication
        run: railway whoami

      - name: Link Railway project for status checks
        run: |
          railway link \
            --project "$RAILWAY_PROJECT_ID" \
            --environment "$RAILWAY_ENVIRONMENT" \
            --service "Turni-di-Palco" \
            --json

      - name: Prefer auto-deploy, fallback only when not active
        run: |
          set -euo pipefail
          services=(
            "Turni-di-Palco"
            "Maxwell-AI-Support"
            "Turni-di-Palco-Control-Plane"
            "Turni-di-Palco-Badges"
          )

          get_active_state() {
            local service="$1"
            local status_json deployment_id status deployments_json commit
            status_json="$(railway service status --service "$service" --environment "$RAILWAY_ENVIRONMENT" --json)"
            deployment_id="$(echo "$status_json" | jq -r '.deploymentId // ""')"
            status="$(echo "$status_json" | jq -r '.status // ""')"
            if [ -z "$deployment_id" ]; then
              echo "${status}||"
              return 0
            fi
            deployments_json="$(railway deployment list --service "$service" --environment "$RAILWAY_ENVIRONMENT" --limit 100 --json)"
            commit="$(echo "$deployments_json" | jq -r --arg id "$deployment_id" '[.[] | select(.id == $id) | .meta.commitHash][0] // ""')"
            echo "${status}|${commit}|${deployment_id}"
          }

          wait_for_auto_success() {
            local service="$1"
            local attempts=18
            local sleep_seconds=20
            local attempt status commit deployment_id
            for attempt in $(seq 1 "$attempts"); do
              IFS='|' read -r status commit deployment_id <<<"$(get_active_state "$service")"
              echo "[$service] auto-check ${attempt}/${attempts} status=${status:-unknown} active_commit=${commit:-none} deployment=${deployment_id:-none}"
              # Accept SUCCESS status even if commit metadata is missing (Railway issue)
              if [ "$status" = "SUCCESS" ]; then
                if [ "$commit" = "$DEPLOY_SHA" ] || [ "$commit" = "" ] || [ "$commit" = "none" ]; then
                  return 0
                fi
              fi
              sleep "$sleep_seconds"
            done
            return 1
          }

          verify_after_fallback() {
            local service="$1"
            local attempts=12
            local sleep_seconds=10
            local attempt status commit deployment_id
            for attempt in $(seq 1 "$attempts"); do
              IFS='|' read -r status commit deployment_id <<<"$(get_active_state "$service")"
              echo "[$service] fallback-check ${attempt}/${attempts} status=${status:-unknown} active_commit=${commit:-none} deployment=${deployment_id:-none}"
              # Accept SUCCESS status even if commit metadata is missing (Railway issue)
              if [ "$status" = "SUCCESS" ]; then
                if [ "$commit" = "$DEPLOY_SHA" ] || [ "$commit" = "" ] || [ "$commit" = "none" ]; then
                  return 0
                fi
              fi
              sleep "$sleep_seconds"
            done
            return 1
          }

          for service in "${services[@]}"; do
            if wait_for_auto_success "$service"; then
              echo "[$service] auto-deploy is active for commit $DEPLOY_SHA"
              continue
            fi

            echo "[$service] auto-deploy did not become active for $DEPLOY_SHA; triggering fallback deploy"
            railway up \
              --ci \
              --project "$RAILWAY_PROJECT_ID" \
              --environment "$RAILWAY_ENVIRONMENT" \
              --service "$service" \
              --message "fallback:${DEPLOY_SHA}"

            if ! verify_after_fallback "$service"; then
              echo "::error::Railway service $service is not SUCCESS on commit $DEPLOY_SHA after fallback deploy."
              exit 1
            fi
          done

  deploy-turni:
    runs-on: ubuntu-latest
    needs: sync-deploy-preview-branches
    permissions:
      contents: read
      actions: write
      deployments: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create GitHub Deployment - Turni-di-Palco
        uses: chrnorm/deployment-action@v2
        id: deployment-turni
        with:
          token: '${{ github.token }}'
          ref: render/preview
          environment-url: https://turni-di-palco-fq85.onrender.com
          environment: render/preview - Turni-di-Palco
          description: 'Deploy Turni-di-Palco to Render preview'

      - name: Mark deployment in progress - Turni-di-Palco
        if: always() && steps.deployment-turni.outputs.deployment_id != ''
        uses: chrnorm/deployment-status@v2
        with:
          token: '${{ github.token }}'
          deployment-id: ${{ steps.deployment-turni.outputs.deployment_id }}
          state: 'in_progress'
          environment-url: https://turni-di-palco-fq85.onrender.com

      - name: Wait for Turni-di-Palco auto-deploy
        id: wait-turni
        uses: ./.github/actions/wait-render-deploy
        with:
          deploy_sha: ${{ needs.sync-deploy-preview-branches.outputs.deploy_sha }}
          sync_epoch: ${{ needs.sync-deploy-preview-branches.outputs.sync_epoch }}
          render_api_key: ${{ secrets.RENDER_API_KEY }}
          render_service_id: ${{ secrets.RENDER_SERVICE_ID_TURNI }}
          label: Turni-di-Palco

      - name: Update deployment status (success) - Turni-di-Palco
        if: always() && steps.wait-turni.outputs.deploy_status == 'success' && steps.deployment-turni.outputs.deployment_id != ''
        uses: chrnorm/deployment-status@v2
        with:
          token: '${{ github.token }}'
          deployment-id: ${{ steps.deployment-turni.outputs.deployment_id }}
          state: 'success'
          environment-url: https://turni-di-palco-fq85.onrender.com

      - name: Update deployment status (failure) - Turni-di-Palco
        if: always() && steps.wait-turni.outputs.deploy_status != 'success' && steps.deployment-turni.outputs.deployment_id != ''
        uses: chrnorm/deployment-status@v2
        with:
          token: '${{ github.token }}'
          deployment-id: ${{ steps.deployment-turni.outputs.deployment_id }}
          state: 'failure'
          environment-url: https://turni-di-palco-fq85.onrender.com

      - name: Fail job if Turni-di-Palco deploy failed
        if: always() && steps.wait-turni.outputs.deploy_status != 'success'
        run: exit 1

  deploy-maxwell:
    runs-on: ubuntu-latest
    needs: sync-deploy-preview-branches
    permissions:
      contents: read
      actions: write
      deployments: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create GitHub Deployment - Maxwell-AI-Support
        uses: chrnorm/deployment-action@v2
        id: deployment-maxwell
        with:
          token: '${{ github.token }}'
          ref: render/preview
          environment-url: https://maxwell-ai-support.onrender.com
          environment: render/preview - Maxwell-AI-Support
          description: 'Deploy Maxwell-AI-Support to Render preview'

      - name: Mark deployment in progress - Maxwell-AI-Support
        if: always() && steps.deployment-maxwell.outputs.deployment_id != ''
        uses: chrnorm/deployment-status@v2
        with:
          token: '${{ github.token }}'
          deployment-id: ${{ steps.deployment-maxwell.outputs.deployment_id }}
          state: 'in_progress'
          environment-url: https://maxwell-ai-support.onrender.com

      - name: Wait for Maxwell-AI-Support auto-deploy
        id: wait-maxwell
        uses: ./.github/actions/wait-render-deploy
        with:
          deploy_sha: ${{ needs.sync-deploy-preview-branches.outputs.deploy_sha }}
          sync_epoch: ${{ needs.sync-deploy-preview-branches.outputs.sync_epoch }}
          render_api_key: ${{ secrets.RENDER_API_KEY }}
          render_service_id: ${{ secrets.RENDER_SERVICE_ID_MAXWELL }}
          label: Maxwell-AI-Support
          max_attempts: "150"

      - name: Update deployment status (success) - Maxwell-AI-Support
        if: always() && steps.wait-maxwell.outputs.deploy_status == 'success' && steps.deployment-maxwell.outputs.deployment_id != ''
        uses: chrnorm/deployment-status@v2
        with:
          token: '${{ github.token }}'
          deployment-id: ${{ steps.deployment-maxwell.outputs.deployment_id }}
          state: 'success'
          environment-url: https://maxwell-ai-support.onrender.com

      - name: Update deployment status (failure) - Maxwell-AI-Support
        if: always() && steps.wait-maxwell.outputs.deploy_status != 'success' && steps.deployment-maxwell.outputs.deployment_id != ''
        uses: chrnorm/deployment-status@v2
        with:
          token: '${{ github.token }}'
          deployment-id: ${{ steps.deployment-maxwell.outputs.deployment_id }}
          state: 'failure'
          environment-url: https://maxwell-ai-support.onrender.com

      - name: Fail job if Maxwell-AI-Support deploy failed
        if: always() && steps.wait-maxwell.outputs.deploy_status != 'success'
        run: exit 1

  deploy-control-plane:
    runs-on: ubuntu-latest
    needs: sync-deploy-preview-branches
    permissions:
      contents: read
      actions: write
      deployments: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create GitHub Deployment - Turni-di-Palco-Control-Plane
        uses: chrnorm/deployment-action@v2
        id: deployment-control-plane
        with:
          token: '${{ github.token }}'
          ref: render/preview
          environment-url: https://turni-di-palco-control-plane.onrender.com
          environment: render/preview - Turni-di-Palco-Control-Plane
          description: 'Deploy Turni-di-Palco-Control-Plane to Render preview'

      - name: Mark deployment in progress - Turni-di-Palco-Control-Plane
        if: always() && steps.deployment-control-plane.outputs.deployment_id != ''
        uses: chrnorm/deployment-status@v2
        with:
          token: '${{ github.token }}'
          deployment-id: ${{ steps.deployment-control-plane.outputs.deployment_id }}
          state: 'in_progress'
          environment-url: https://turni-di-palco-control-plane.onrender.com

      - name: Wait for Turni-di-Palco-Control-Plane auto-deploy
        id: wait-control-plane
        uses: ./.github/actions/wait-render-deploy
        with:
          deploy_sha: ${{ needs.sync-deploy-preview-branches.outputs.deploy_sha }}
          sync_epoch: ${{ needs.sync-deploy-preview-branches.outputs.sync_epoch }}
          render_api_key: ${{ secrets.RENDER_API_KEY }}
          render_service_id: ${{ secrets.RENDER_SERVICE_ID_CONTROL_PLANE }}
          label: Turni-di-Palco-Control-Plane

      - name: Update deployment status (success) - Turni-di-Palco-Control-Plane
        if: always() && steps.wait-control-plane.outputs.deploy_status == 'success' && steps.deployment-control-plane.outputs.deployment_id != ''
        uses: chrnorm/deployment-status@v2
        with:
          token: '${{ github.token }}'
          deployment-id: ${{ steps.deployment-control-plane.outputs.deployment_id }}
          state: 'success'
          environment-url: https://turni-di-palco-control-plane.onrender.com

      - name: Update deployment status (failure) - Turni-di-Palco-Control-Plane
        if: always() && steps.wait-control-plane.outputs.deploy_status != 'success' && steps.deployment-control-plane.outputs.deployment_id != ''
        uses: chrnorm/deployment-status@v2
        with:
          token: '${{ github.token }}'
          deployment-id: ${{ steps.deployment-control-plane.outputs.deployment_id }}
          state: 'failure'
          environment-url: https://turni-di-palco-control-plane.onrender.com

      - name: Fail job if Turni-di-Palco-Control-Plane deploy failed
        if: always() && steps.wait-control-plane.outputs.deploy_status != 'success'
        run: exit 1

  
