name: Sync Deploy Branches

on:
  push:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: sync-deploy-branches
  cancel-in-progress: true

jobs:
  sync-deploy-preview-branches:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      deploy_sha: ${{ steps.sync-preview-branches.outputs.deploy_sha }}
      sync_epoch: ${{ steps.sync-preview-branches.outputs.sync_epoch }}
    steps:
      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync preview branches
        id: sync-preview-branches
        env:
          GH_SYNC_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          git remote set-url origin "https://x-access-token:${GH_SYNC_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

          retry() {
            for attempt in 1 2 3; do
              if "$@"; then
                return 0
              fi
              echo "Command failed (attempt ${attempt}/3): $*" >&2
              sleep 2
            done
            return 1
          }

          retry git fetch origin main
          # Hard align deploy preview branches to main to avoid merge commits
          git checkout -B render/preview origin/main
          retry git push -f origin render/preview
          git checkout -B railway/preview origin/main
          retry git push -f origin railway/preview
          echo "deploy_sha=$(git rev-parse origin/main)" >> "$GITHUB_OUTPUT"
          echo "sync_epoch=$(date +%s)" >> "$GITHUB_OUTPUT"

  deploy-railway:
    runs-on: ubuntu-latest
    needs: sync-deploy-preview-branches
    permissions:
      contents: read
    env:
      RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
      RAILWAY_PROJECT_ID: 1517725a-20c2-49d2-baea-3be40ad0d8d2
      RAILWAY_ENVIRONMENT: production
      DEPLOY_SHA: ${{ needs.sync-deploy-preview-branches.outputs.deploy_sha }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate Railway token
        run: |
          set -euo pipefail
          if [ -z "${RAILWAY_API_TOKEN:-}" ]; then
            echo "::error::Missing secret RAILWAY_API_TOKEN. Configure it in repository secrets to enable deterministic Railway deploys."
            exit 1
          fi

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Verify Railway authentication
        run: railway whoami

      - name: Link Railway project for status checks
        run: |
          railway link \
            --project "$RAILWAY_PROJECT_ID" \
            --environment "$RAILWAY_ENVIRONMENT" \
            --service "Turni-di-Palco" \
            --json

      - name: Prefer auto-deploy, fallback only when not active
        run: |
          set -euo pipefail
          services=(
            "Turni-di-Palco"
            "Maxwell-AI-Support"
            "Turni-di-Palco-Control-Plane"
            "Turni-di-Palco-Badges"
          )

          get_active_state() {
            local service="$1"
            local status_json deployment_id status deployments_json commit
            status_json="$(railway service status --service "$service" --environment "$RAILWAY_ENVIRONMENT" --json)"
            deployment_id="$(echo "$status_json" | jq -r '.deploymentId // ""')"
            status="$(echo "$status_json" | jq -r '.status // ""')"
            if [ -z "$deployment_id" ]; then
              echo "${status}||"
              return 0
            fi
            deployments_json="$(railway deployment list --service "$service" --environment "$RAILWAY_ENVIRONMENT" --limit 100 --json)"
            commit="$(echo "$deployments_json" | jq -r --arg id "$deployment_id" '[.[] | select(.id == $id) | .meta.commitHash][0] // ""')"
            echo "${status}|${commit}|${deployment_id}"
          }

          wait_for_auto_success() {
            local service="$1"
            local attempts=18
            local sleep_seconds=20
            local attempt status commit deployment_id
            for attempt in $(seq 1 "$attempts"); do
              IFS='|' read -r status commit deployment_id <<<"$(get_active_state "$service")"
              echo "[$service] auto-check ${attempt}/${attempts} status=${status:-unknown} active_commit=${commit:-none} deployment=${deployment_id:-none}"
              # Accept SUCCESS status even if commit metadata is missing (Railway issue)
              if [ "$status" = "SUCCESS" ]; then
                if [ "$commit" = "$DEPLOY_SHA" ] || [ "$commit" = "" ] || [ "$commit" = "none" ]; then
                  return 0
                fi
              fi
              sleep "$sleep_seconds"
            done
            return 1
          }

          verify_after_fallback() {
            local service="$1"
            local attempts=12
            local sleep_seconds=10
            local attempt status commit deployment_id
            for attempt in $(seq 1 "$attempts"); do
              IFS='|' read -r status commit deployment_id <<<"$(get_active_state "$service")"
              echo "[$service] fallback-check ${attempt}/${attempts} status=${status:-unknown} active_commit=${commit:-none} deployment=${deployment_id:-none}"
              # Accept SUCCESS status even if commit metadata is missing (Railway issue)
              if [ "$status" = "SUCCESS" ]; then
                if [ "$commit" = "$DEPLOY_SHA" ] || [ "$commit" = "" ] || [ "$commit" = "none" ]; then
                  return 0
                fi
              fi
              sleep "$sleep_seconds"
            done
            return 1
          }

          for service in "${services[@]}"; do
            if wait_for_auto_success "$service"; then
              echo "[$service] auto-deploy is active for commit $DEPLOY_SHA"
              continue
            fi

            echo "[$service] auto-deploy did not become active for $DEPLOY_SHA; triggering fallback deploy"
            railway up \
              --ci \
              --project "$RAILWAY_PROJECT_ID" \
              --environment "$RAILWAY_ENVIRONMENT" \
              --service "$service" \
              --message "fallback:${DEPLOY_SHA}"

            if ! verify_after_fallback "$service"; then
              echo "::error::Railway service $service is not SUCCESS on commit $DEPLOY_SHA after fallback deploy."
              exit 1
            fi
          done

  deploy-turni:
    runs-on: ubuntu-latest
    needs: sync-deploy-preview-branches
    permissions:
      contents: read
      actions: write
      deployments: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create GitHub Deployment - Turni-di-Palco
        uses: chrnorm/deployment-action@v2
        id: deployment-turni
        with:
          token: '${{ github.token }}'
          ref: render/preview
          environment-url: https://turni-di-palco-fq85.onrender.com
          environment: render/preview - Turni-di-Palco
          description: 'Deploy Turni-di-Palco to Render preview'

      - name: Mark deployment in progress - Turni-di-Palco
        if: always() && steps.deployment-turni.outputs.deployment_id != ''
        uses: chrnorm/deployment-status@v2
        with:
          token: '${{ github.token }}'
          deployment-id: ${{ steps.deployment-turni.outputs.deployment_id }}
          state: 'in_progress'
          environment-url: https://turni-di-palco-fq85.onrender.com

      - name: Wait for Turni-di-Palco auto-deploy
        id: wait-turni
        uses: ./.github/actions/wait-render-deploy
        with:
          deploy_sha: ${{ needs.sync-deploy-preview-branches.outputs.deploy_sha }}
          sync_epoch: ${{ needs.sync-deploy-preview-branches.outputs.sync_epoch }}
          render_api_key: ${{ secrets.RENDER_API_KEY }}
          render_service_id: ${{ secrets.RENDER_SERVICE_ID_TURNI }}
          label: Turni-di-Palco

      - name: Update deployment status (success) - Turni-di-Palco
        if: always() && steps.wait-turni.outputs.deploy_status == 'success' && steps.deployment-turni.outputs.deployment_id != ''
        uses: chrnorm/deployment-status@v2
        with:
          token: '${{ github.token }}'
          deployment-id: ${{ steps.deployment-turni.outputs.deployment_id }}
          state: 'success'
          environment-url: https://turni-di-palco-fq85.onrender.com

      - name: Update deployment status (failure) - Turni-di-Palco
        if: always() && steps.wait-turni.outputs.deploy_status != 'success' && steps.deployment-turni.outputs.deployment_id != ''
        uses: chrnorm/deployment-status@v2
        with:
          token: '${{ github.token }}'
          deployment-id: ${{ steps.deployment-turni.outputs.deployment_id }}
          state: 'failure'
          environment-url: https://turni-di-palco-fq85.onrender.com

      - name: Fail job if Turni-di-Palco deploy failed
        if: always() && steps.wait-turni.outputs.deploy_status != 'success'
        run: exit 1

  deploy-maxwell:
    runs-on: ubuntu-latest
    needs: sync-deploy-preview-branches
    permissions:
      contents: read
      actions: write
      deployments: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create GitHub Deployment - Maxwell-AI-Support
        uses: chrnorm/deployment-action@v2
        id: deployment-maxwell
        with:
          token: '${{ github.token }}'
          ref: render/preview
          environment-url: https://maxwell-ai-support.onrender.com
          environment: render/preview - Maxwell-AI-Support
          description: 'Deploy Maxwell-AI-Support to Render preview'

      - name: Mark deployment in progress - Maxwell-AI-Support
        if: always() && steps.deployment-maxwell.outputs.deployment_id != ''
        uses: chrnorm/deployment-status@v2
        with:
          token: '${{ github.token }}'
          deployment-id: ${{ steps.deployment-maxwell.outputs.deployment_id }}
          state: 'in_progress'
          environment-url: https://maxwell-ai-support.onrender.com

      - name: Wait for Maxwell-AI-Support auto-deploy
        id: wait-maxwell
        uses: ./.github/actions/wait-render-deploy
        with:
          deploy_sha: ${{ needs.sync-deploy-preview-branches.outputs.deploy_sha }}
          sync_epoch: ${{ needs.sync-deploy-preview-branches.outputs.sync_epoch }}
          render_api_key: ${{ secrets.RENDER_API_KEY }}
          render_service_id: ${{ secrets.RENDER_SERVICE_ID_MAXWELL }}
          label: Maxwell-AI-Support
          max_attempts: "150"

      - name: Update deployment status (success) - Maxwell-AI-Support
        if: always() && steps.wait-maxwell.outputs.deploy_status == 'success' && steps.deployment-maxwell.outputs.deployment_id != ''
        uses: chrnorm/deployment-status@v2
        with:
          token: '${{ github.token }}'
          deployment-id: ${{ steps.deployment-maxwell.outputs.deployment_id }}
          state: 'success'
          environment-url: https://maxwell-ai-support.onrender.com

      - name: Update deployment status (failure) - Maxwell-AI-Support
        if: always() && steps.wait-maxwell.outputs.deploy_status != 'success' && steps.deployment-maxwell.outputs.deployment_id != ''
        uses: chrnorm/deployment-status@v2
        with:
          token: '${{ github.token }}'
          deployment-id: ${{ steps.deployment-maxwell.outputs.deployment_id }}
          state: 'failure'
          environment-url: https://maxwell-ai-support.onrender.com

      - name: Fail job if Maxwell-AI-Support deploy failed
        if: always() && steps.wait-maxwell.outputs.deploy_status != 'success'
        run: exit 1

  deploy-control-plane:
    runs-on: ubuntu-latest
    needs: sync-deploy-preview-branches
    permissions:
      contents: read
      actions: write
      deployments: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create GitHub Deployment - Turni-di-Palco-Control-Plane
