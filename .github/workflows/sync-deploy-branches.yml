name: Sync Deploy Branches

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:

  configuration:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Configure Git
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"

  sync-render-preview:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
      
    steps:
    - name: Configure Git
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Sync branch
      run: |
        git fetch origin main
        # Hard align render/preview to main to avoid merge commits
        git checkout -B render/preview origin/main
        git push -f origin render/preview

    - name: Trigger Render deployments
      run: |
        echo "✅ Branches synchronized successfully"
        echo "🔄 Render will auto-deploy render/preview"
        echo "🌐 Netlify will auto-deploy netlify/preview (if configured)"
        
    - name: Trigger Render Deploy Workflow
      run: |
        echo "🚀 Triggering deploy-render workflow..."
        gh workflow run deploy-render.yml --field branch=render/preview

  sync-netlify-preview:
    needs: sync-render-preview
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Configure Git
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Sync branch
      run: |
        git fetch origin main
        # Hard align netlify/preview to main to avoid merge commits
        git checkout -B netlify/preview origin/main
        git push -f origin netlify/preview

    - name: Trigger Netlify deployments
      run: |
        echo "✅ Branches synchronized successfully"
        echo "🔄 Render will auto-deploy render/preview"
        echo "🌐 Netlify will auto-deploy netlify/preview (if configured)"
