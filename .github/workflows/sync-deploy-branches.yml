name: Sync Deploy Branches

on:
  push:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: sync-deploy-branches
  cancel-in-progress: true

jobs:
  sync-deploy-preview-branches:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      deploy_sha: ${{ steps.sync-preview-branches.outputs.deploy_sha }}
      sync_epoch: ${{ steps.sync-preview-branches.outputs.sync_epoch }}
    steps:
      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync preview branches
        id: sync-preview-branches
        env:
          GH_SYNC_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          git remote set-url origin "https://x-access-token:${GH_SYNC_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

          retry() {
            for attempt in 1 2 3; do
              if "$@"; then
                return 0
              fi
              echo "Command failed (attempt ${attempt}/3): $*" >&2
              sleep 2
            done
            return 1
          }

          retry git fetch origin main
          # Hard align deploy preview branches to main to avoid merge commits
          git checkout -B render/preview origin/main
          retry git push -f origin render/preview
          echo "deploy_sha=$(git rev-parse origin/main)" >> "$GITHUB_OUTPUT"
          echo "sync_epoch=$(date +%s)" >> "$GITHUB_OUTPUT"

  deploy-turni:
    runs-on: ubuntu-latest
    needs: sync-deploy-preview-branches
    permissions:
      contents: read
      actions: write
      deployments: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Create GitHub Deployment - Turni-di-Palco
        uses: chrnorm/deployment-action@v2
        id: deployment-turni
        with:
          token: '${{ github.token }}'
          ref: render/preview
          environment-url: https://turni-di-palco-fq85.onrender.com
          environment: render/preview - Turni-di-Palco
          description: 'Deploy Turni-di-Palco to Render preview'

      - name: Mark deployment in progress - Turni-di-Palco
        if: always() && steps.deployment-turni.outputs.deployment_id != ''
        uses: chrnorm/deployment-status@v2
        with:
          token: '${{ github.token }}'
          deployment-id: ${{ steps.deployment-turni.outputs.deployment_id }}
          state: 'in_progress'
          environment-url: https://turni-di-palco-fq85.onrender.com

      - name: Wait for Turni-di-Palco auto-deploy
        id: wait-turni
        uses: ./.github/actions/wait-render-deploy
        with:
          deploy_sha: ${{ needs.sync-deploy-preview-branches.outputs.deploy_sha }}
          sync_epoch: ${{ needs.sync-deploy-preview-branches.outputs.sync_epoch }}
          render_api_key: ${{ secrets.RENDER_API_KEY }}
          render_service_id: ${{ secrets.RENDER_SERVICE_ID_TURNI }}
          label: Turni-di-Palco

      - name: Update deployment status (success) - Turni-di-Palco
        if: always() && steps.wait-turni.outputs.deploy_status == 'success' && steps.deployment-turni.outputs.deployment_id != ''
        uses: chrnorm/deployment-status@v2
        with:
          token: '${{ github.token }}'
          deployment-id: ${{ steps.deployment-turni.outputs.deployment_id }}
          state: 'success'
          environment-url: https://turni-di-palco-fq85.onrender.com

      - name: Update deployment status (failure) - Turni-di-Palco
        if: always() && steps.wait-turni.outputs.deploy_status != 'success' && steps.deployment-turni.outputs.deployment_id != ''
        uses: chrnorm/deployment-status@v2
        with:
          token: '${{ github.token }}'
          deployment-id: ${{ steps.deployment-turni.outputs.deployment_id }}
          state: 'failure'
          environment-url: https://turni-di-palco-fq85.onrender.com

      - name: Fail job if Turni-di-Palco deploy failed
        if: always() && steps.wait-turni.outputs.deploy_status != 'success'
        run: exit 1

  deploy-maxwell:
    runs-on: ubuntu-latest
    needs: sync-deploy-preview-branches
    permissions:
      contents: read
      actions: write
      deployments: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Create GitHub Deployment - Maxwell-AI-Support
        uses: chrnorm/deployment-action@v2
        id: deployment-maxwell
        with:
          token: '${{ github.token }}'
          ref: render/preview
          environment-url: https://maxwell-ai-support.onrender.com
          environment: render/preview - Maxwell-AI-Support
          description: 'Deploy Maxwell-AI-Support to Render preview'

      - name: Mark deployment in progress - Maxwell-AI-Support
        if: always() && steps.deployment-maxwell.outputs.deployment_id != ''
        uses: chrnorm/deployment-status@v2
        with:
          token: '${{ github.token }}'
          deployment-id: ${{ steps.deployment-maxwell.outputs.deployment_id }}
          state: 'in_progress'
          environment-url: https://maxwell-ai-support.onrender.com

      - name: Wait for Maxwell-AI-Support auto-deploy
        id: wait-maxwell
        uses: ./.github/actions/wait-render-deploy
        with:
          deploy_sha: ${{ needs.sync-deploy-preview-branches.outputs.deploy_sha }}
          sync_epoch: ${{ needs.sync-deploy-preview-branches.outputs.sync_epoch }}
          render_api_key: ${{ secrets.RENDER_API_KEY }}
          render_service_id: ${{ secrets.RENDER_SERVICE_ID_MAXWELL }}
          label: Maxwell-AI-Support
          max_attempts: "150"

      - name: Update deployment status (success) - Maxwell-AI-Support
        if: always() && steps.wait-maxwell.outputs.deploy_status == 'success' && steps.deployment-maxwell.outputs.deployment_id != ''
        uses: chrnorm/deployment-status@v2
        with:
          token: '${{ github.token }}'
          deployment-id: ${{ steps.deployment-maxwell.outputs.deployment_id }}
          state: 'success'
          environment-url: https://maxwell-ai-support.onrender.com

      - name: Update deployment status (failure) - Maxwell-AI-Support
        if: always() && steps.wait-maxwell.outputs.deploy_status != 'success' && steps.deployment-maxwell.outputs.deployment_id != ''
        uses: chrnorm/deployment-status@v2
        with:
          token: '${{ github.token }}'
          deployment-id: ${{ steps.deployment-maxwell.outputs.deployment_id }}
          state: 'failure'
          environment-url: https://maxwell-ai-support.onrender.com

      - name: Fail job if Maxwell-AI-Support deploy failed
        if: always() && steps.wait-maxwell.outputs.deploy_status != 'success'
        run: exit 1

  deploy-control-plane:
    runs-on: ubuntu-latest
    needs: sync-deploy-preview-branches
    permissions:
      contents: read
      actions: write
      deployments: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Create GitHub Deployment - Turni-di-Palco-Control-Plane
        uses: chrnorm/deployment-action@v2
        id: deployment-control-plane
        with:
          token: '${{ github.token }}'
          ref: render/preview
          environment-url: https://turni-di-palco-control-plane.onrender.com
          environment: render/preview - Turni-di-Palco-Control-Plane
          description: 'Deploy Turni-di-Palco-Control-Plane to Render preview'

      - name: Mark deployment in progress - Turni-di-Palco-Control-Plane
        if: always() && steps.deployment-control-plane.outputs.deployment_id != ''
        uses: chrnorm/deployment-status@v2
        with:
          token: '${{ github.token }}'
          deployment-id: ${{ steps.deployment-control-plane.outputs.deployment_id }}
          state: 'in_progress'
          environment-url: https://turni-di-palco-control-plane.onrender.com

      - name: Wait for Turni-di-Palco-Control-Plane auto-deploy
        id: wait-control-plane
        uses: ./.github/actions/wait-render-deploy
        with:
          deploy_sha: ${{ needs.sync-deploy-preview-branches.outputs.deploy_sha }}
          sync_epoch: ${{ needs.sync-deploy-preview-branches.outputs.sync_epoch }}
          render_api_key: ${{ secrets.RENDER_API_KEY }}
          render_service_id: ${{ secrets.RENDER_SERVICE_ID_CONTROL_PLANE }}
          label: Turni-di-Palco-Control-Plane

      - name: Update deployment status (success) - Turni-di-Palco-Control-Plane
        if: always() && steps.wait-control-plane.outputs.deploy_status == 'success' && steps.deployment-control-plane.outputs.deployment_id != ''
        uses: chrnorm/deployment-status@v2
        with:
          token: '${{ github.token }}'
          deployment-id: ${{ steps.deployment-control-plane.outputs.deployment_id }}
          state: 'success'
          environment-url: https://turni-di-palco-control-plane.onrender.com

      - name: Update deployment status (failure) - Turni-di-Palco-Control-Plane
        if: always() && steps.wait-control-plane.outputs.deploy_status != 'success' && steps.deployment-control-plane.outputs.deployment_id != ''
        uses: chrnorm/deployment-status@v2
        with:
          token: '${{ github.token }}'
          deployment-id: ${{ steps.deployment-control-plane.outputs.deployment_id }}
          state: 'failure'
          environment-url: https://turni-di-palco-control-plane.onrender.com

      - name: Fail job if Turni-di-Palco-Control-Plane deploy failed
        if: always() && steps.wait-control-plane.outputs.deploy_status != 'success'
        run: exit 1

  
