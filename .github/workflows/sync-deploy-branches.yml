name: Sync Deploy Branches

on:
  push:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: sync-deploy-branches
  cancel-in-progress: true

jobs:
  sync-deploy-preview-branches:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      deploy_sha: ${{ steps.sync-preview-branches.outputs.deploy_sha }}
      sync_epoch: ${{ steps.sync-preview-branches.outputs.sync_epoch }}
    steps:
      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync preview branches
        id: sync-preview-branches
        env:
          GH_SYNC_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          git remote set-url origin "https://x-access-token:${GH_SYNC_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

          retry() {
            for attempt in 1 2 3; do
              if "$@"; then
                return 0
              fi
              echo "Command failed (attempt ${attempt}/3): $*" >&2
              sleep 2
            done
            return 1
          }

          retry git fetch origin main
          # Hard align deploy preview branches to main to avoid merge commits
          git checkout -B render/preview origin/main
          retry git push -f origin render/preview
          git checkout -B railway/preview origin/main
          retry git push -f origin railway/preview
          echo "deploy_sha=$(git rev-parse origin/main)" >> "$GITHUB_OUTPUT"
          echo "sync_epoch=$(date +%s)" >> "$GITHUB_OUTPUT"

  deploy-railway:
    runs-on: ubuntu-latest
    needs: sync-deploy-preview-branches
    permissions:
      contents: read
    env:
      RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
      RAILWAY_PROJECT_ID: 1517725a-20c2-49d2-baea-3be40ad0d8d2
      RAILWAY_ENVIRONMENT: production
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate Railway token
        run: |
          set -euo pipefail
          if [ -z "${RAILWAY_API_TOKEN:-}" ]; then
            echo "::error::Missing secret RAILWAY_API_TOKEN. Configure it in repository secrets to enable deterministic Railway deploys."
            exit 1
          fi

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Verify Railway authentication
        run: railway whoami

      - name: Force deploy Turni-di-Palco on Railway
        run: |
          railway up \
            --ci \
            --project "$RAILWAY_PROJECT_ID" \
            --environment "$RAILWAY_ENVIRONMENT" \
            --service "Turni-di-Palco" \
            --message "sync-deploy-branches:${{ needs.sync-deploy-preview-branches.outputs.deploy_sha }}"

      - name: Force deploy Maxwell-AI-Support on Railway
        run: |
          railway up \
            --ci \
            --project "$RAILWAY_PROJECT_ID" \
            --environment "$RAILWAY_ENVIRONMENT" \
            --service "Maxwell-AI-Support" \
            --message "sync-deploy-branches:${{ needs.sync-deploy-preview-branches.outputs.deploy_sha }}"

      - name: Force deploy Turni-di-Palco-Control-Plane on Railway
        run: |
          railway up \
            --ci \
            --project "$RAILWAY_PROJECT_ID" \
            --environment "$RAILWAY_ENVIRONMENT" \
            --service "Turni-di-Palco-Control-Plane" \
            --message "sync-deploy-branches:${{ needs.sync-deploy-preview-branches.outputs.deploy_sha }}"

      - name: Force deploy Turni-di-Palco-Badges on Railway
        run: |
          railway up \
            --ci \
            --project "$RAILWAY_PROJECT_ID" \
            --environment "$RAILWAY_ENVIRONMENT" \
            --service "Turni-di-Palco-Badges" \
            --message "sync-deploy-branches:${{ needs.sync-deploy-preview-branches.outputs.deploy_sha }}"

      - name: Link Railway project for status checks
        run: |
          railway link \
            --project "$RAILWAY_PROJECT_ID" \
            --environment "$RAILWAY_ENVIRONMENT" \
            --service "Turni-di-Palco" \
            --json

      - name: Verify active Railway service statuses
        run: |
          set -euo pipefail
          for service in \
            "Turni-di-Palco" \
            "Maxwell-AI-Support" \
            "Turni-di-Palco-Control-Plane" \
            "Turni-di-Palco-Badges"; do
            status_json="$(railway service status --service "$service" --environment "$RAILWAY_ENVIRONMENT" --json)"
            echo "$status_json"
            status="$(echo "$status_json" | jq -r '.status')"
            if [ "$status" != "SUCCESS" ]; then
              echo "::error::Railway service $service is not SUCCESS after forced deploy."
              exit 1
            fi
          done

  deploy-turni:
    runs-on: ubuntu-latest
    needs: sync-deploy-preview-branches
    permissions:
      contents: read
      actions: write
      deployments: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create GitHub Deployment - Turni-di-Palco
        uses: chrnorm/deployment-action@v2
        id: deployment-turni
        with:
          token: '${{ github.token }}'
          ref: render/preview
          environment-url: https://turni-di-palco-fq85.onrender.com
          environment: render/preview - Turni-di-Palco
          description: 'Deploy Turni-di-Palco to Render preview'

      - name: Mark deployment in progress - Turni-di-Palco
        if: always() && steps.deployment-turni.outputs.deployment_id != ''
        uses: chrnorm/deployment-status@v2
        with:
          token: '${{ github.token }}'
          deployment-id: ${{ steps.deployment-turni.outputs.deployment_id }}
          state: 'in_progress'
          environment-url: https://turni-di-palco-fq85.onrender.com

      - name: Wait for Turni-di-Palco auto-deploy
        id: wait-turni
        uses: ./.github/actions/wait-render-deploy
        with:
          deploy_sha: ${{ needs.sync-deploy-preview-branches.outputs.deploy_sha }}
          sync_epoch: ${{ needs.sync-deploy-preview-branches.outputs.sync_epoch }}
          render_api_key: ${{ secrets.RENDER_API_KEY }}
          render_service_id: ${{ secrets.RENDER_SERVICE_ID_TURNI }}
          label: Turni-di-Palco

      - name: Update deployment status (success) - Turni-di-Palco
        if: always() && steps.wait-turni.outputs.deploy_status == 'success' && steps.deployment-turni.outputs.deployment_id != ''
        uses: chrnorm/deployment-status@v2
        with:
          token: '${{ github.token }}'
          deployment-id: ${{ steps.deployment-turni.outputs.deployment_id }}
          state: 'success'
          environment-url: https://turni-di-palco-fq85.onrender.com

      - name: Update deployment status (failure) - Turni-di-Palco
        if: always() && steps.wait-turni.outputs.deploy_status != 'success' && steps.deployment-turni.outputs.deployment_id != ''
        uses: chrnorm/deployment-status@v2
        with:
          token: '${{ github.token }}'
          deployment-id: ${{ steps.deployment-turni.outputs.deployment_id }}
          state: 'failure'
          environment-url: https://turni-di-palco-fq85.onrender.com

      - name: Fail job if Turni-di-Palco deploy failed
        if: always() && steps.wait-turni.outputs.deploy_status != 'success'
        run: exit 1

  deploy-maxwell:
    runs-on: ubuntu-latest
    needs: sync-deploy-preview-branches
    permissions:
      contents: read
      actions: write
      deployments: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create GitHub Deployment - Maxwell-AI-Support
        uses: chrnorm/deployment-action@v2
        id: deployment-maxwell
        with:
          token: '${{ github.token }}'
          ref: render/preview
          environment-url: https://maxwell-ai-support.onrender.com
          environment: render/preview - Maxwell-AI-Support
          description: 'Deploy Maxwell-AI-Support to Render preview'

      - name: Mark deployment in progress - Maxwell-AI-Support
        if: always() && steps.deployment-maxwell.outputs.deployment_id != ''
        uses: chrnorm/deployment-status@v2
        with:
          token: '${{ github.token }}'
          deployment-id: ${{ steps.deployment-maxwell.outputs.deployment_id }}
          state: 'in_progress'
          environment-url: https://maxwell-ai-support.onrender.com

      - name: Wait for Maxwell-AI-Support auto-deploy
        id: wait-maxwell
        uses: ./.github/actions/wait-render-deploy
        with:
          deploy_sha: ${{ needs.sync-deploy-preview-branches.outputs.deploy_sha }}
          sync_epoch: ${{ needs.sync-deploy-preview-branches.outputs.sync_epoch }}
          render_api_key: ${{ secrets.RENDER_API_KEY }}
          render_service_id: ${{ secrets.RENDER_SERVICE_ID_MAXWELL }}
          label: Maxwell-AI-Support
          max_attempts: "150"

      - name: Update deployment status (success) - Maxwell-AI-Support
        if: always() && steps.wait-maxwell.outputs.deploy_status == 'success' && steps.deployment-maxwell.outputs.deployment_id != ''
        uses: chrnorm/deployment-status@v2
        with:
          token: '${{ github.token }}'
          deployment-id: ${{ steps.deployment-maxwell.outputs.deployment_id }}
          state: 'success'
          environment-url: https://maxwell-ai-support.onrender.com

      - name: Update deployment status (failure) - Maxwell-AI-Support
        if: always() && steps.wait-maxwell.outputs.deploy_status != 'success' && steps.deployment-maxwell.outputs.deployment_id != ''
        uses: chrnorm/deployment-status@v2
        with:
          token: '${{ github.token }}'
          deployment-id: ${{ steps.deployment-maxwell.outputs.deployment_id }}
          state: 'failure'
          environment-url: https://maxwell-ai-support.onrender.com

      - name: Fail job if Maxwell-AI-Support deploy failed
        if: always() && steps.wait-maxwell.outputs.deploy_status != 'success'
        run: exit 1

  deploy-control-plane:
    runs-on: ubuntu-latest
    needs: sync-deploy-preview-branches
    permissions:
      contents: read
      actions: write
      deployments: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create GitHub Deployment - Turni-di-Palco-Control-Plane
        uses: chrnorm/deployment-action@v2
        id: deployment-control-plane
        with:
          token: '${{ github.token }}'
          ref: render/preview
          environment-url: https://turni-di-palco-control-plane.onrender.com
          environment: render/preview - Turni-di-Palco-Control-Plane
          description: 'Deploy Turni-di-Palco-Control-Plane to Render preview'

      - name: Mark deployment in progress - Turni-di-Palco-Control-Plane
        if: always() && steps.deployment-control-plane.outputs.deployment_id != ''
        uses: chrnorm/deployment-status@v2
        with:
          token: '${{ github.token }}'
          deployment-id: ${{ steps.deployment-control-plane.outputs.deployment_id }}
          state: 'in_progress'
          environment-url: https://turni-di-palco-control-plane.onrender.com

      - name: Wait for Turni-di-Palco-Control-Plane auto-deploy
        id: wait-control-plane
        uses: ./.github/actions/wait-render-deploy
        with:
          deploy_sha: ${{ needs.sync-deploy-preview-branches.outputs.deploy_sha }}
          sync_epoch: ${{ needs.sync-deploy-preview-branches.outputs.sync_epoch }}
          render_api_key: ${{ secrets.RENDER_API_KEY }}
          render_service_id: ${{ secrets.RENDER_SERVICE_ID_CONTROL_PLANE }}
          label: Turni-di-Palco-Control-Plane

      - name: Update deployment status (success) - Turni-di-Palco-Control-Plane
        if: always() && steps.wait-control-plane.outputs.deploy_status == 'success' && steps.deployment-control-plane.outputs.deployment_id != ''
        uses: chrnorm/deployment-status@v2
        with:
          token: '${{ github.token }}'
          deployment-id: ${{ steps.deployment-control-plane.outputs.deployment_id }}
          state: 'success'
          environment-url: https://turni-di-palco-control-plane.onrender.com

      - name: Update deployment status (failure) - Turni-di-Palco-Control-Plane
        if: always() && steps.wait-control-plane.outputs.deploy_status != 'success' && steps.deployment-control-plane.outputs.deployment_id != ''
        uses: chrnorm/deployment-status@v2
        with:
          token: '${{ github.token }}'
          deployment-id: ${{ steps.deployment-control-plane.outputs.deployment_id }}
          state: 'failure'
          environment-url: https://turni-di-palco-control-plane.onrender.com

      - name: Fail job if Turni-di-Palco-Control-Plane deploy failed
        if: always() && steps.wait-control-plane.outputs.deploy_status != 'success'
        run: exit 1

  deploy-badges:
    runs-on: ubuntu-latest
    needs: sync-deploy-preview-branches
    permissions:
      contents: read
      actions: write
      deployments: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create GitHub Deployment - Turni-di-Palco-Badges
        uses: chrnorm/deployment-action@v2
        id: deployment-badges
        with:
          token: '${{ github.token }}'
          ref: render/preview
          environment-url: https://turni-di-palco-badges.onrender.com
          environment: render/preview - Turni-di-Palco-Badges
          description: 'Deploy Turni-di-Palco-Badges to Render preview'

      - name: Mark deployment in progress - Turni-di-Palco-Badges
        if: always() && steps.deployment-badges.outputs.deployment_id != ''
        uses: chrnorm/deployment-status@v2
        with:
          token: '${{ github.token }}'
          deployment-id: ${{ steps.deployment-badges.outputs.deployment_id }}
          state: 'in_progress'
          environment-url: https://turni-di-palco-badges.onrender.com

      - name: Wait for Turni-di-Palco-Badges auto-deploy
        id: wait-badges
        uses: ./.github/actions/wait-render-deploy
        with:
          deploy_sha: ${{ needs.sync-deploy-preview-branches.outputs.deploy_sha }}
          sync_epoch: ${{ needs.sync-deploy-preview-branches.outputs.sync_epoch }}
          render_api_key: ${{ secrets.RENDER_API_KEY }}
          render_service_id: ${{ secrets.RENDER_SERVICE_ID_BADGES }}
          label: Turni-di-Palco-Badges

      - name: Update deployment status (success) - Turni-di-Palco-Badges
        if: always() && steps.wait-badges.outputs.deploy_status == 'success' && steps.deployment-badges.outputs.deployment_id != ''
        uses: chrnorm/deployment-status@v2
        with:
          token: '${{ github.token }}'
          deployment-id: ${{ steps.deployment-badges.outputs.deployment_id }}
          state: 'success'
          environment-url: https://turni-di-palco-badges.onrender.com

      - name: Update deployment status (failure) - Turni-di-Palco-Badges
        if: always() && steps.wait-badges.outputs.deploy_status != 'success' && steps.deployment-badges.outputs.deployment_id != ''
        uses: chrnorm/deployment-status@v2
        with:
          token: '${{ github.token }}'
          deployment-id: ${{ steps.deployment-badges.outputs.deployment_id }}
          state: 'failure'
          environment-url: https://turni-di-palco-badges.onrender.com

      - name: Fail job if Turni-di-Palco-Badges deploy failed
        if: always() && steps.wait-badges.outputs.deploy_status != 'success'
        run: exit 1
