          state: 'in_progress'
          environment-url: https://turni-di-palco-control-plane.onrender.com

      - name: Wait for Turni-di-Palco-Control-Plane auto-deploy
        id: wait-control-plane
        uses: ./.github/actions/wait-render-deploy
        with:
          deploy_sha: ${{ needs.sync-deploy-preview-branches.outputs.deploy_sha }}
          sync_epoch: ${{ needs.sync-deploy-preview-branches.outputs.sync_epoch }}
          render_api_key: ${{ secrets.RENDER_API_KEY }}
          render_service_id: ${{ secrets.RENDER_SERVICE_ID_CONTROL_PLANE }}
          label: Turni-di-Palco-Control-Plane

      - name: Update deployment status (success) - Turni-di-Palco-Control-Plane
        if: always() && steps.wait-control-plane.outputs.deploy_status == 'success' && steps.deployment-control-plane.outputs.deployment_id != ''
        uses: chrnorm/deployment-status@v2
        with:
          token: '${{ github.token }}'
          deployment-id: ${{ steps.deployment-control-plane.outputs.deployment_id }}
          state: 'success'
          environment-url: https://turni-di-palco-control-plane.onrender.com

      - name: Update deployment status (failure) - Turni-di-Palco-Control-Plane
        if: always() && steps.wait-control-plane.outputs.deploy_status != 'success' && steps.deployment-control-plane.outputs.deployment_id != ''
        uses: chrnorm/deployment-status@v2
        with:
          token: '${{ github.token }}'
          deployment-id: ${{ steps.deployment-control-plane.outputs.deployment_id }}
          state: 'failure'
          environment-url: https://turni-di-palco-control-plane.onrender.com

      - name: Fail job if Turni-di-Palco-Control-Plane deploy failed
        if: always() && steps.wait-control-plane.outputs.deploy_status != 'success'
        run: exit 1

  deploy-badges:
    runs-on: ubuntu-latest
    needs: sync-deploy-preview-branches
    permissions:
      contents: read
      actions: write
      deployments: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create GitHub Deployment - Turni-di-Palco-Badges
        uses: chrnorm/deployment-action@v2
        id: deployment-badges
        with:
          token: '${{ github.token }}'
          ref: render/preview
          environment-url: https://turni-di-palco-badges.onrender.com
          environment: render/preview - Turni-di-Palco-Badges
