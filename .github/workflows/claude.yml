# =============================================================================
# Claude Code — interattivo (@claude mention)
# -----------------------------------------------------------------------------
# Risponde quando qualcuno scrive "@claude ..." in:
#   - commenti su issue
#   - commenti su PR
#   - commenti di review inline
#   - corpo/titolo di una issue appena aperta o assegnata
#
# Auth: OAuth token legato all'abbonamento Claude.ai (Pro/Max).
#   Secret richiesto: CLAUDE_CODE_OAUTH_TOKEN
#   Generato con `claude setup-token` da terminale.
# =============================================================================

name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]

# Evita più run paralleli sulla stessa issue/PR
concurrency:
  group: claude-${{ github.event.issue.number || github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  claude:
    # Skip se non c'è una @claude mention reale
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write       # modificare file, aprire branch
      pull-requests: write  # creare/aggiornare PR, commenti review
      issues: write         # commentare su issue
      id-token: write       # OIDC (innocuo per OAuth, utile se cambi auth)
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # Per usare Opus 4.7 invece del default Sonnet, decommenta:
          # claude_args: "--max-turns 15 --model claude-opus-4-7"
          claude_args: "--max-turns 15"
