name: iOS TestFlight

on:
  workflow_dispatch:
    inputs:
      release_notes:
        description: "Release notes for this upload"
        required: false
        default: "Build uploaded from GitHub Actions"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  upload-testflight:
    runs-on: macos-15
    defaults:
      run:
        shell: bash
    env:
      IOS_BUNDLE_ID: ${{ vars.IOS_BUNDLE_ID }}
      IOS_TEAM_ID: ${{ vars.IOS_TEAM_ID }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.14.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Resolve iOS version metadata
        id: ios_version
        run: |
          MARKETING_VERSION="$(node -p "require('./apps/mobile/package.json').version")"
          if [ -z "$MARKETING_VERSION" ]; then
            echo "Unable to resolve apps/mobile package version"
            exit 1
          fi
          BUILD_NUMBER="${GITHUB_RUN_NUMBER}"
          if ! [[ "$BUILD_NUMBER" =~ ^[0-9]+$ ]]; then
            echo "Invalid GITHUB_RUN_NUMBER: $BUILD_NUMBER"
            exit 1
          fi
          echo "marketing_version=$MARKETING_VERSION" >> "$GITHUB_OUTPUT"
          echo "build_number=$BUILD_NUMBER" >> "$GITHUB_OUTPUT"
          echo "Using MARKETING_VERSION=$MARKETING_VERSION CURRENT_PROJECT_VERSION=$BUILD_NUMBER"

      - name: Ensure iOS platform exists
        run: |
          if [ ! -d "apps/mobile/ios/App" ]; then
            npm --workspace apps/mobile run ios:add
          fi

      - name: Build and sync iOS web assets
        run: npm --workspace apps/mobile run ios:sync

      - name: Import code-signing certificate
        uses: apple-actions/import-codesign-certs@v6
        with:
          p12-file-base64: ${{ secrets.IOS_DISTRIBUTION_CERT_P12_BASE64 }}
          p12-password: ${{ secrets.IOS_DISTRIBUTION_CERT_PASSWORD }}

      - name: Download provisioning profiles
        uses: apple-actions/download-provisioning-profiles@v5
        with:
          bundle-id: ${{ env.IOS_BUNDLE_ID != '' && env.IOS_BUNDLE_ID || 'com.turnidipalco.mobile' }}
          profile-type: IOS_APP_STORE
          issuer-id: ${{ vars.APPSTORE_ISSUER_ID }}
          api-key-id: ${{ vars.APPSTORE_API_KEY_ID }}
          api-private-key: ${{ secrets.APPSTORE_API_PRIVATE_KEY }}

      - name: Create export options
        run: |
          TEAM_ID="${IOS_TEAM_ID}"
          if [ -z "$TEAM_ID" ]; then
            echo "Missing repository variable IOS_TEAM_ID"
            exit 1
          fi
          cat > "$RUNNER_TEMP/ExportOptions.plist" <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>destination</key>
            <string>export</string>
            <key>method</key>
            <string>app-store</string>
            <key>signingStyle</key>
            <string>automatic</string>
            <key>stripSwiftSymbols</key>
            <true/>
            <key>teamID</key>
            <string>${TEAM_ID}</string>
          </dict>
          </plist>
          PLIST

      - name: Archive iOS app
        env:
          IOS_MARKETING_VERSION: ${{ steps.ios_version.outputs.marketing_version }}
          IOS_BUILD_NUMBER: ${{ steps.ios_version.outputs.build_number }}
        run: |
          TEAM_ID="${IOS_TEAM_ID}"
          if [ -z "$TEAM_ID" ]; then
            echo "Missing repository variable IOS_TEAM_ID"
            exit 1
          fi
          xcodebuild \
            -project apps/mobile/ios/App/App.xcodeproj \
            -scheme App \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath "$RUNNER_TEMP/App.xcarchive" \
            CODE_SIGN_STYLE=Automatic \
            DEVELOPMENT_TEAM="$TEAM_ID" \
            MARKETING_VERSION="$IOS_MARKETING_VERSION" \
            CURRENT_PROJECT_VERSION="$IOS_BUILD_NUMBER" \
            archive

      - name: Export IPA
        id: export
        run: |
          xcodebuild \
            -exportArchive \
            -archivePath "$RUNNER_TEMP/App.xcarchive" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist" \
            -exportPath "$RUNNER_TEMP/export"

          IPA_PATH="$(find "$RUNNER_TEMP/export" -maxdepth 1 -name "*.ipa" | head -n 1)"
          if [ -z "$IPA_PATH" ]; then
            echo "IPA not found in export directory"
            ls -la "$RUNNER_TEMP/export"
            exit 1
          fi
          echo "path=$IPA_PATH" >> "$GITHUB_OUTPUT"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: ${{ steps.export.outputs.path }}
          if-no-files-found: error

      - name: Upload build to TestFlight
        uses: apple-actions/upload-testflight-build@v4
        with:
          app-path: ${{ steps.export.outputs.path }}
          issuer-id: ${{ vars.APPSTORE_ISSUER_ID }}
          api-key-id: ${{ vars.APPSTORE_API_KEY_ID }}
          api-private-key: ${{ secrets.APPSTORE_API_PRIVATE_KEY }}
          release-notes: ${{ inputs.release_notes }}
