name: Sync Repositories

on:
    push:
        branches: [ main ]
    workflow_dispatch:

jobs:
  sync-repositories:
    runs-on: [self-hosted, Windows, X64]
    defaults:
      run:
        shell: powershell
        working-directory: ${{ github.workspace }}
    steps:

      # -----------------------------------------------------------------
      # 1) Avvio Codex con permessi gia impostati
      # -----------------------------------------------------------------
      - name: Prompting Codex
        run: |
          if (-not (Get-Command codex -ErrorAction SilentlyContinue)) {
            Write-Error 'CLI "codex" non trovato nel runner.'
            exit 1
          }

          $promptLines = @(
            'Ci sono delle modifiche che ho fatto nella repo Turni-di-Palco-UI,'
            'vorrei che tu le portassi nella repository principale Turni-di-Palco,'
            'quando hai finito invia un messaggio che il sistema del workflow possa'
            'riconoscere: "Success".'
          )
          $prompt = $promptLines -join [Environment]::NewLine

          codex $prompt --ask-for-approval=never | Out-File -FilePath codex.log -Encoding utf8

      # -----------------------------------------------------------------
      # 2) Attesa della risposta "Success" nel log
      # -----------------------------------------------------------------
      - name: Attesa risposta Codex
        id: wait_codex
        run: |
          $logPath = Join-Path $PWD 'codex.log'
          $maxAttempts = 30
          $attempt = 0

          while ($attempt -lt $maxAttempts) {
            if (Test-Path $logPath) {
              if (Get-Content $logPath | Select-String -Pattern "Success" -SimpleMatch -Quiet) {
                break
              }
            }
            Start-Sleep -Seconds 1
            $attempt++
          }

          if (-not (Test-Path $logPath)) {
            Write-Error "Log codex non trovato: $logPath"
            exit 1
          }

          if ($attempt -ge $maxAttempts) {
            Write-Error "Timeout in attesa di Success (tentativi: $maxAttempts)"
            exit 1
          }

      # -----------------------------------------------------------------
      # 3) Verifica finale
      # -----------------------------------------------------------------
      - name: Controllo successo Codex
        id: check_success
        run: |
          $logPath = Join-Path $PWD 'codex.log'

          if (-not (Test-Path $logPath)) {
            Write-Error "Log codex non trovato: $logPath"
            exit 1
          }

          if (Get-Content $logPath | Select-String -Pattern "Success" -SimpleMatch -Quiet) {
            "status=Success" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          } else {
            "status=Failure" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
            exit 1
          }
