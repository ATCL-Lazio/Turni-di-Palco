# =============================================================================
# NOTICE AND WARNING SETTINGS
# =============================================================================
# Control which notices and warnings are displayed in the CLI

[notice]
# Hide migration prompt for gpt-5.1-codex-max model
"hide_gpt-5.1-codex-max_migration_prompt" = true
# Hide warning about full file system access
hide_full_access_warning = true
# Hide warning about world-writable directory access
hide_world_writable_warning = true
hide_rate_limit_model_nudge = true

# Model migration mappings for automatic updates
# When old models are deprecated, automatically map to new versions
[notice.model_migrations]
"gpt-5.1-codex-max" = "gpt-5.2-codex"
"gpt-5.2" = "gpt-5.3-codex"
"gpt-5.2-codex" = "gpt-5.3-codex"
"gpt-5.3-codex" = "gpt-5.4"

