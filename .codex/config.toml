[features]
# Enable unified execution model for improved performance
unified_exec = true
# Enable shell snapshot functionality for command history
shell_snapshot = true
# Enable UTF-8 support for PowerShell
powershell_utf8 = true
# Enable steering capabilities for fine-tuned control
steer = true
# Enable RMCP client for remote MCP connections
rmcp_client = true
# Enable collaboration features (experimental)
multi_agent = true
# Enable experimental Windows sandbox (unstable)
experimental_windows_sandbox = true
# Enable elevated Windows sandbox (requires admin privileges)
elevated_windows_sandbox = true
# Enable apps feature
apps = true

[tui]
