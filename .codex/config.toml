# For more information, visit: https://github.com/openai/codex

# Suppress warning about under-development features
suppress_unstable_features_warning = true

# =============================================================================
# CORE MODEL SETTINGS
# =============================================================================

# Default AI model to use for code generation and assistance
# Available models: gpt-4, gpt-4-turbo, gpt-3.5-turbo, gpt-5.2-codex, etc.
model = "gpt-5.4"

# Reasoning effort level for the model (affects response quality and speed)
# Options: "low", "medium", "high", "xhigh"
model_reasoning_effort = "xhigh"

# AI personality style for interactions
# Options: "pragmatic", "creative", "analytical", etc.
personality = "pragmatic"
approvals_reviewer = "user"
